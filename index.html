<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slider-container">

        <h1>Image Slider</h1>

        <div class="slider">

            <div class="slide active">
                <img src="https://picsum.photos/id/1015/1000/500" alt="Image 1">
            </div>

            <div class="slide">
                <img src="https://picsum.photos/id/1016/1000/500" alt="Image 2">
            </div>

            <div class="slide">
                <img src="https://picsum.photos/id/1018/1000/500" alt="Image 3">
            </div>

            <div class="slide">
                <img src="https://picsum.photos/id/1025/1000/500" alt="Image 4">
            </div>

            <button class="prev" id="prevBtn">&#10094;</button>
            <button class="next" id="nextBtn">&#10095;</button>

        </div>

        <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
